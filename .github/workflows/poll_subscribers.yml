name: Poll Telegram Subscribers

on:
  schedule:
    # Run every 30 minutes to check for new /start commands
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  poll-and-onboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the DB back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new subscribers
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python run_daily.py --poll --data-dir .

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if files exist and there are changes
          [ -f researchradar.db ] && git add researchradar.db
          [ -f .tg_offset ] && git add .tg_offset
          
          git commit -m "Automated: Update subscribers list [skip ci]" || echo "No changes to commit"
          git push

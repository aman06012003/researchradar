name: Automatic Research Pipeline

on:
  schedule:
    # Monday 1:00 AM UTC: Cleanup previous week's data
    - cron: '0 1 * * 1'
    # Mon-Fri 2:00 AM UTC: Fetch and store daily digests
    - cron: '0 2 * * 1-5'
    # Sunday 2:00 AM UTC: Generate weekly Medium article
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  research-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine Action
        id: action_step
        run: |
          DAY_OF_WEEK=$(date +%u) # 1=Mon, 7=Sun
          HOUR=$(date +%H)
          if [ "$DAY_OF_WEEK" -eq 1 ] && [ "$HOUR" -eq 1 ]; then
            echo "mode=cleanup" >> $GITHUB_OUTPUT
          elif [ "$DAY_OF_WEEK" -ge 1 ] && [ "$DAY_OF_WEEK" -le 5 ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          elif [ "$DAY_OF_WEEK" -eq 7 ]; then
            echo "mode=article" >> $GITHUB_OUTPUT
          else
            echo "mode=skip" >> $GITHUB_OUTPUT
          fi

      - name: Run Cleanup
        if: steps.action_step.outputs.mode == 'cleanup'
        run: python run_daily.py --cleanup --data-dir .

      - name: Run Daily Fetch
        if: steps.action_step.outputs.mode == 'daily'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily.py --now --data-dir .

      - name: Generate Medium Article
        if: steps.action_step.outputs.mode == 'article'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_daily.py --article --data-dir . > medium_article.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Only add if files exist
          [ -f researchradar.duckdb ] && git add researchradar.duckdb
          [ -f .tg_offset ] && git add .tg_offset
          [ -f medium_article.md ] && git add medium_article.md
          git commit -m "Automated Research Pipeline Update [skip ci]" || echo "No changes to commit"
          git push
